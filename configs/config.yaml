project:
  name: "MayDay Health Forecast"
  version: "0.1.0"

forecast:
  horizon: 12
  frequency: "W"
  random_seed: 42
  train_ratio: 0.8

kaggle:
  dataset: "emmanuelniyioriolowo/ncdc-lassa-fever-timeseries-20202025"

nasa_power:
  base_url: "https://power.larc.nasa.gov/api/temporal/daily/point"

  parameters:
    - PRECTOTCORR
    - T2M
    - RH2M

  start_year: 2020
  end_year: 2025
  community: AG
  format: JSON

data:
  raw: data/raw
  interim: data/interim
  processed: data/processed
  external: data/external
  downloads: data/downloads
  metadata: data/metadata

logging:
  level: INFO
